version: "3.8"

services:
  crypto_bot:
    build: .
    container_name: crypto_bot
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY}
      - API_SECRET=${API_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    command: python main.py run